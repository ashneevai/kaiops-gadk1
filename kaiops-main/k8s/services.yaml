apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-adapter
  namespace: kaiops
spec:
  replicas: 2
  selector: { matchLabels: { app: monitoring-adapter } }
  template:
    metadata: { labels: { app: monitoring-adapter } }
    spec:
      containers:
        - name: monitoring-adapter
          image: ghcr.io/example/kaiops/monitoring-adapter:latest
          imagePullPolicy: IfNotPresent
          workingDir: /app/services/monitoring-adapter
          command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom: [{ configMapRef: { name: kaiops-config } }, { secretRef: { name: kaiops-secrets } }]
          env: [{ name: SERVICE_NAME, value: monitoring-adapter }]
          ports: [{ containerPort: 8000 }]
          readinessProbe: { httpGet: { path: /readyz, port: 8000 } }
          livenessProbe: { httpGet: { path: /healthz, port: 8000 } }
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-adapter
  namespace: kaiops
spec:
  selector: { app: monitoring-adapter }
  ports: [{ port: 8000, targetPort: 8000 }]
---
